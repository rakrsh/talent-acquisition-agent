version: '3.8'

services:
  # Main API Gateway
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:///./data/job_agent.db
      - SEARCH_SERVICE_URL=http://search:8081/search
    volumes:
      - ./data:/app/data
      - ./input:/app/input
    depends_on:
      - search
      - mongodb

  # Search Microservice
  search:
    build:
      context: .
      dockerfile: services/search/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SEARCH_SERVICE_PORT=8081
    volumes:
      - ./input:/app/input
    restart: always

  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - api

  # Infrastructure
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3001" # Shifted to avoid conflict with Next.js (3000)

volumes:
  mongodb_data:
