apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-deployment
  namespace: job-agent
  labels:
    app: search
    app.kubernetes.io/name: job-agent
    app.kubernetes.io/component: search
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
        app.kubernetes.io/name: job-agent
        app.kubernetes.io/component: search
    spec:
      containers:
      - name: search
        image: job-agent-search:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: SEARCH_SERVICE_PORT
          value: "8081"
        volumeMounts:
        - name: input
          mountPath: /app/input
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: input
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: job-agent
  labels:
    app.kubernetes.io/name: job-agent
    app.kubernetes.io/component: search
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: search
