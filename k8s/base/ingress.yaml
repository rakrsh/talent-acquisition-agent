apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: job-agent-ingress
  namespace: job-agent
  labels:
    app.kubernetes.io/name: job-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - job-agent.example.com
    secretName: job-agent-tls  # pragma: allowlist secret
  rules:
  - host: job-agent.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8080
      - path: /search
        pathType: Prefix
        backend:
          service:
            name: search-service
            port:
              number: 8081
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service
            port:
              number: 3000
