apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: job-agent-network-policy
  namespace: job-agent
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: job-agent
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: job-agent
  egress:
  - to:
    - podSelector: {}
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
