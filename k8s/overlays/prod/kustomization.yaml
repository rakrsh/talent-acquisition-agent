apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: job-agent-prod

resources:
  - ../../base

commonLabels:
  environment: prod

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-deployment
      spec:
        replicas: 3
    target:
      kind: Deployment
      name: api-deployment
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: search-deployment
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: search-deployment
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web-deployment
      spec:
        replicas: 3
    target:
      kind: Deployment
      name: web-deployment

configMapGenerator:
  - name: job-agent-config
    behavior: replace
    literals:
      - DATABASE_URL=postgresql://postgres:5432/job_agent
      - SEARCH_SERVICE_URL=http://search-service:8081/search
      - NEXT_PUBLIC_API_URL=https://jobs.example.com

replicas:
  - name: api-deployment
    count: 3
  - name: search-deployment
    count: 2
  - name: web-deployment
    count: 3
