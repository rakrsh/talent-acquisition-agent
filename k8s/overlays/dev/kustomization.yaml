apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: job-agent-dev

resources:
  - ../../base

commonLabels:
  environment: dev

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-deployment
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: api-deployment
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: search-deployment
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: search-deployment
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web-deployment
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: web-deployment

configMapGenerator:
  - name: job-agent-config
    behavior: replace
    literals:
      - DATABASE_URL=sqlite:///./data/job_agent.db
      - SEARCH_SERVICE_URL=http://search-service:8081/search
      - NEXT_PUBLIC_API_URL=http://api-service:8080
