{{- if .Values.mongodb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "job-agent.fullname" . }}-mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "job-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "job-agent.labels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "job-agent.labels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      containers:
      - name: mongodb
        image: {{ .Values.mongodb.image }}
        ports:
        - name: mongo
          containerPort: {{ .Values.service.mongodb.port }}
          protocol: TCP
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        resources:
          {{- toYaml .Values.resources.mongodb | nindent 10 }}
      volumes:
      - name: mongodb-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "job-agent.fullname" . }}-mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "job-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.mongodb.port }}
    targetPort: mongo
    protocol: TCP
    name: mongo
  selector:
    {{- include "job-agent.labels" . | nindent 6 }}
    app.kubernetes.io/component: database
{{- end }}
