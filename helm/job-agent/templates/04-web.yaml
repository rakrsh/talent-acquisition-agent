apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "job-agent.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "job-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "job-agent.labels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Chart.Name "-config") . | sha256sum }}
      labels:
        {{- include "job-agent.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "job-agent.fullname" . }}-serviceaccount
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: web
        image: "{{ .Values.image.repository }}/web:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.web.port }}
          protocol: TCP
        env:
        - name: NEXT_PUBLIC_API_URL
          valueFrom:
            configMapKeyRef:
              name: {{ include "job-agent.fullname" . }}-config
              key: NEXT_PUBLIC_API_URL
        - name: NODE_ENV
          value: "production"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
        resources:
          {{- toYaml .Values.resources.web | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "job-agent.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "job-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.web.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "job-agent.labels" . | nindent 6 }}
    app.kubernetes.io/component: web
