name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  security-sast:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-check:
    name: Security & License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: uv sync --all-extras --group dev
      - name: Run pip-audit (Vulnerability Scan)
        run: |
          uv export --format requirements-txt --output-file requirements.txt
          uv run pip install --upgrade pip
          # CVE-2026-3219 is a known issue in pip 26.0.1; ignoring until fix is available
          uv run pip-audit -r requirements.txt --ignore-vuln CVE-2026-3219
      - name: License check
        run: uv run pip-licenses --summary

  backend-test:
    name: Backend Tests
    needs: [lint-and-format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --all-extras --group dev
      - name: Run API Service Tests
        run: |
          export PYTHONPATH=$(pwd)/services/api:$(pwd)/src
          uv run pytest tests/services/api --cov=services/api --cov-report=xml:api-coverage.xml
      - name: Run Search Service Tests
        run: |
          export PYTHONPATH=$(pwd)/services/search:$(pwd)/src
          uv run pytest tests/services/search --cov=services/search --cov-report=xml:search-coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./api-coverage.xml,./search-coverage.xml
          fail_ci_if_error: false

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/web/package.json
      - name: Install dependencies
        run: |
          cd services/web
          npm install
      - name: Build frontend
        run: |
          cd services/web
          npm run build

  build-docs:
    name: Verify Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: uv sync --all-extras --group dev
      - name: Build docs (Dry Run)
        run: uv run sphinx-build -W -b html docs/source/ docs/build/html
