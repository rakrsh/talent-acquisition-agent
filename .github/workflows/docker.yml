name: Build and Push Docker Images & Helm Charts

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Determine version from pyproject.toml or git tags
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_tag: ${{ steps.version.outputs.is_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: version
        run: |
          # Check if this is a tag push
          if [[ ${{ github.ref }} == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Check if there's a matching tag for the current commit
          elif git describe --tags --exact-match 2>/dev/null; then
            VERSION=$(git describe --tags --exact-match | sed 's/^v//')
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Use version from pyproject.toml
          else
            VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
            # Remove .devN suffix for release-like versions
            VERSION=${VERSION%.dev*}
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

  # Build and push API service
  build-api:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: needs.version.outputs.is_tag == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{ version }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Talent Acquisition Agent - API Service

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          push: ${{ needs.version.outputs.is_tag == 'true' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.version.outputs.version }}

  # Build and push Search service
  build-search:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: needs.version.outputs.is_tag == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Search
        id: meta-search
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/search
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{ version }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Talent Acquisition Agent - Search Service

      - name: Build and push Search image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/search/Dockerfile
          push: ${{ needs.version.outputs.is_tag == 'true' }}
          tags: ${{ steps.meta-search.outputs.tags }}
          labels: ${{ steps.meta-search.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.version.outputs.version }}

  # Build and push Web service
  build-web:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: needs.version.outputs.is_tag == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{ version }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Talent Acquisition Agent - Web Service

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/web/Dockerfile
          push: ${{ needs.version.outputs.is_tag == 'true' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.version.outputs.version }}

  # Create GitHub release on tag push
  release:
    needs: [version, build-api, build-search, build-web, helm-chart]
    runs-on: ubuntu-latest
    if: needs.version.outputs.is_tag == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download API image
        uses: actions/download-artifact@v4
        with:
          name: api-image
          path: api-image

      - name: Download Search image
        uses: actions/download-artifact@v4
        with:
          name: search-image
          path: search-image

      - name: Download Web image
        uses: actions/download-artifact@v4
        with:
          name: web-image
          path: web-image

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --since="$(git describe --tags --abbrev=0 ^HEAD)"..HEAD 2>/dev/null || echo "- Initial release")
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release v${{ needs.version.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Docker Images

            | Service | Image |
            |---------|-------|
            | API | `ghcr.io/${{ env.IMAGE_NAME }}/api:v${{ needs.version.outputs.version }}` |
            | Search | `ghcr.io/${{ env.IMAGE_NAME }}/search:v${{ needs.version.outputs.version }}` |
            | Web | `ghcr.io/${{ env.IMAGE_NAME }}/web:v${{ needs.version.outputs.version }}` |

            ## Installation

            ```bash
            docker pull ghcr.io/${{ env.IMAGE_NAME }}/api:v${{ needs.version.outputs.version }}
            docker pull ghcr.io/${{ env.IMAGE_NAME }}/search:v${{ needs.version.outputs.version }}
            docker pull ghcr.io/${{ env.IMAGE_NAME }}/web:v${{ needs.version.outputs.version }}
            ```
          draft: false
          prerelease: ${{ contains(needs.version.outputs.version, 'alpha') || contains(needs.version.outputs.version, 'beta') }}

  # Package and publish Helm chart
  helm-chart:
    needs: version
    runs-on: ubuntu-latest
    if: needs.version.outputs.is_tag == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.35.2/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Update Chart.yaml with version
        run: |
          # Update the chart version from pyproject.toml
          PYPROJECT_VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          CHART_VERSION=${PYPROJECT_VERSION%.dev*}

          # Update Chart.yaml
          yq -i '.version = env(CHART_VERSION)' helm/job-agent/Chart.yaml
          yq -i '.appVersion = env(CHART_VERSION)' helm/job-agent/Chart.yaml

          echo "Chart version: $CHART_VERSION"

      - name: Package Helm chart
        run: |
          helm package helm/job-agent --version ${{ needs.version.outputs.version }}

      - name: Create Helm chart repository
        run: |
          # Create index.yaml for the chart repository
          helm repo index . --url https://${{ github.actor }}.github.io/${{ github.repository }}/helm

      - name: Upload Helm chart as artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: |
            *.tgz
            index.yaml

      - name: Publish Helm chart to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true
        if: github.ref == 'refs/heads/main'

      - name: Create GitHub Release for Helm chart
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tgz
          body: |
            ## Helm Chart

            Install the chart:

            ```bash
            helm repo add job-agent https://${{ github.actor }}.github.io/${{ github.repository }}/helm
            helm install job-agent job-agent/job-agent --version ${{ needs.version.outputs.version }}
            ```
