name: Deploy Multi-Version Docs

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build
        run: |
          uv sync --all-extras
          cd docs && uv run sphinx-multiversion source/ build/html
          echo '<!DOCTYPE html><html><head><title>Redirecting</title><meta http-equiv="refresh" content="0; url=main/index.html"></head><body><p>Redirecting to <a href="main/index.html">main/index.html</a></p></body></html>' > build/html/index.html

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/build/html
          clean: true
          force: true
          single-commit: true
